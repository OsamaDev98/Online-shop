<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Metallic Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b88a12" />
      <stop offset="30%" stop-color="#f5d98a" />
      <stop offset="70%" stop-color="#d4a017" />
      <stop offset="100%" stop-color="#f0c84a" />
    </linearGradient>
    <!-- Deep Navy Gradient -->
    <linearGradient id="navy-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1a3e" />
      <stop offset="100%" stop-color="#1e2d6e" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f1a3e" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Rounded Rect container -->
  <rect x="5" y="5" width="90" height="90" rx="24" fill="url(#navy-grad)" stroke="url(#gold-grad)" stroke-width="2.5" filter="url(#glow)" />
  <!-- Abstract structural layout for "A" and profile cross section -->
  <path d="M28 68 L50 25 L72 68 M34 54 L66 54" stroke="url(#gold-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M42 45 L50 30 L58 45" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8" />
  <circle cx="50" cy="62" r="4.5" fill="url(#gold-grad)" />
</svg>
